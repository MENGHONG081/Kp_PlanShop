server {
    listen 80;
    server_name localhost;
    root /app/User_Page;

    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to .env files and other sensitive configurations
    location ~ /\.env$ {
        deny all;
    }

    # Deny access to Composer vendor directories
    location ~ /vendor/ {
        deny all;
    }

    # Deny access to state files for Telegram bot
    location ~ /state/ {
        deny all;
    }

    # Deny access to log files
    location ~ /telegram_log.txt$ {
        deny all;
    }

    # Deny access to gemini_tell.json
    location ~ /gemini_tell.json$ {
        deny all;
    }

    # Deny access to database.sql
    location ~ /database.sql$ {
        deny all;
    }
}
